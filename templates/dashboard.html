<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exception Registry — GRC Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <span class="brand-mark">§</span>
    <div>
      <h1>Exception Registry</h1>
      <p class="subtitle">Policy Waiver &amp; GRC Process Exception Management</p>
    </div>
  </div>
  <div class="topbar-right">
    <span id="report-date" class="report-date">—</span>
    <button id="export-csv" class="btn btn-ghost">Export flagged CSV</button>
    <button id="export-audit" class="btn btn-primary">Generate audit report</button>
  </div>
</header>

<!-- Signature element: risk pulse strip -->
<div class="pulse-wrap">
  <div class="pulse-bar" id="pulse-bar"></div>
  <div class="pulse-legend" id="pulse-legend"></div>
</div>

<main>
  <section class="kpi-row" id="kpi-row">
    <!-- populated by JS -->
  </section>

  <section class="grid-two">
    <div class="panel">
      <div class="panel-head">
        <h2>By exception type</h2>
      </div>
      <div id="chart-type" class="chart-mount"></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <h2>By department</h2>
      </div>
      <div id="chart-dept" class="chart-mount"></div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>Top high-risk exceptions</h2>
      <span class="panel-note">Sorted by severity, then age</span>
    </div>
    <div id="top-risk-list" class="top-risk-list"></div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>Exception ledger</h2>
      <div class="filters">
        <input id="search-box" type="text" placeholder="Search id, requester, justification…" />
        <select id="filter-status">
          <option value="">All statuses</option>
        </select>
        <select id="filter-severity">
          <option value="">All severities</option>
          <option value="CRITICAL">Critical</option>
          <option value="HIGH">High</option>
          <option value="MEDIUM">Medium</option>
          <option value="LOW">Low</option>
          <option value="NONE">None</option>
        </select>
        <label class="flagged-toggle">
          <input type="checkbox" id="filter-flagged-only" />
          Flagged only
        </label>
      </div>
    </div>
    <div class="table-wrap">
      <table id="exception-table">
        <thead>
          <tr>
            <th data-sort="exception_id">ID</th>
            <th data-sort="type">Type</th>
            <th data-sort="requester">Requester</th>
            <th data-sort="approver">Approver</th>
            <th data-sort="department">Dept</th>
            <th data-sort="end_date">Expires</th>
            <th data-sort="status">Status</th>
            <th data-sort="primary_severity">Severity</th>
            <th>Alerts</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <p id="row-count" class="row-count"></p>
  </section>

  <section class="panel" id="audit-readiness-panel">
    <div class="panel-head">
      <h2>Audit readiness</h2>
    </div>
    <div class="readiness-grid" id="readiness-grid"></div>
  </section>
</main>

<div id="detail-modal" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" id="modal-close">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
